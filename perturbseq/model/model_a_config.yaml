# ============================================================================
# GRIT (Guide-Resolved Inference of Transcriptional Perturbation) configuration
# ============================================================================
# Edit values below to change training, model, and analysis behavior.
# CLI options that are NOT in this file (kept command-line-only):
#   --h5ad-file        input h5ad
#   --guide-map-file   optional gRNA -> target-gene CSV
#   --output-prefix    output prefix for result TSVs
#   --config-file      path to this YAML
# Keys here must match run_real_data_training() parameter names exactly.


# ============================================================================
# Reference / control cells
#   Defines the shared baseline (x_before = mean of this pool) that all
#   perturbation effects are measured against. This is the most consequential
#   choice for the meaning of delta_z and GRIT_score.
# ============================================================================
# reference_mode:
#   nt_only             - use NT (non-targeting) guide cells only
#   nt_and_unperturbed  - also include cells with total gRNA count
#                         <= unperturbed_grna_threshold
reference_mode: nt_and_unperturbed
# Cells with total gRNA count <= this value are treated as unperturbed
# controls (only used when reference_mode = nt_and_unperturbed).
unperturbed_grna_threshold: 3


# ============================================================================
# Training control
#   Optimizer / batch / epochs / random seed.
# ============================================================================
seed: 1000
batch_size: 64
n_epochs: 20
learning_rate: 1.0e-3


# ============================================================================
# Model architecture
#   Latent / hidden sizes, dropout, and cell-state encoder bottleneck.
#   cell_state_dim is the bottleneck width of the target-invariant cell-state
#   encoder that lets z_reference vary per cell.
# ============================================================================
latent_dim: 32
grna_embed_dim: 32
hidden_dim: 128
dropout: 0.1
cell_state_dim: 8


# ============================================================================
# gRNA count encoding
#   Preprocessing applied to c_grna before the perturbation encoder.
#   grna_count_normalization:
#     none   - raw counts
#     l1     - per-cell L1 normalize (sum to 1; destroys dose magnitude)
#     log1p  - log(1 + count) elementwise (preserves dose; default)
#   top_guide_mask_k: keep only top-K guides per cell (0 disables masking).
#   alpha_guide_residual: scale of guide-specific residual embedding added to
#   the target-shared base embedding (0 disables residual; small > 0 lets
#   guide-efficiency variation through under L2 regularization).
# ============================================================================
use_weighted_grna_counts: true
grna_count_normalization: log1p
top_guide_mask_k: 3
guide_dropout_prob: 0.05
alpha_guide_residual: 0.1


# ============================================================================
# Adversarial / debiasing
#   Gradient-reversal-based debiasing plus the cell-state mixing weight.
#   grl_lambda                : GRL coefficient for the guide-identity
#                               adversary on delta_z.
#   grl_lambda_cell_state     : GRL coefficient for the target-invariance
#                               adversary on z_cell_state.
#   gamma_cell_state          : weight of projected z_cell_state added into
#                               z_reference (how strongly cell-state moves
#                               the per-cell baseline).
# ============================================================================
grl_lambda: 0.2
grl_lambda_cell_state: 0.2
gamma_cell_state: 0.2
#gamma_cell_state: 0.3
loss_adv_grna_classifier: 0.02
loss_cell_state_target_adversary: 0.02


# ============================================================================
# Loss weights (general)
#   Reconstruction MSE, VAE KL, and regularization weights that are not part
#   of the adversarial debiasing group above.
# ============================================================================
loss_rna: 1.0
loss_kl: 1.0e-3
loss_guide_residual_l2: 1.0e-3
loss_cell_state_kl: 1.0e-3


# ============================================================================
# gRNA QC
#   Filters out ambiguous multi-guide cells before training and testing.
# ============================================================================
multi_guide_qc: true
min_dominant_guide_fraction: 0.5
max_second_guide_fraction: 0.3


# ============================================================================
# Perturbation-response DE test (cubic B-spline GAM)
#   Per-target gene test that asks whether each gene's expression varies
#   along GRIT_score using a cubic B-spline GAM
#   (pseudotime-DE-inspired). Stricter thresholds skip targets with too few
#   cells / too narrow response score distribution.
# ============================================================================
response_spline_df: 4
response_include_guide_covariate: true
response_min_cells_per_target: 30
response_min_unique_scores: 10
response_min_shrunken_score_iqr: 0.05
